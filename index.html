<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Interactif Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="bg-[#f5f5f5] text-[#333] font-sans h-screen flex flex-col justify-center items-center m-0 overflow-hidden">
    
    <main id="app" class="w-full max-w-2xl px-4">
      <!-- Le contenu du quiz sera injecté ici par JavaScript -->
      <div id="quiz-container" class="bg-white rounded-3xl shadow-xl p-8 md:p-12 transition-all duration-500 transform opacity-100 scale-100">
        
        <!-- Header: Progress Bar -->
        <div class="mb-8">
          <div class="flex justify-between items-center mb-2">
            <span id="question-counter" class="text-xs uppercase tracking-widest font-semibold text-gray-400">Question 1 / 10</span>
            <span id="timer" class="text-xs font-mono font-bold text-orange-500 hidden">00:30</span>
          </div>
          <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-500" style="width: 10%"></div>
          </div>
        </div>

        <!-- Question Section -->
        <div id="question-view">
          <h2 id="question-text" class="text-2xl md:text-3xl font-bold mb-8 leading-tight tracking-tight">Chargement du quiz...</h2>
          
          <div id="options-container" class="grid grid-cols-1 gap-4">
            <!-- Les options seront générées ici -->
          </div>

          <div class="mt-10 flex justify-end">
            <button id="next-btn" class="px-8 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-semibold transition-all duration-200 disabled:opacity-30 disabled:cursor-not-allowed transform hover:scale-105 active:scale-95" disabled>
              Suivant
            </button>
          </div>
        </div>

        <!-- Result Section (Hidden initially) -->
        <div id="result-view" class="hidden text-center py-8">
          <div id="result-icon" class="w-24 h-24 mx-auto mb-6 flex items-center justify-center rounded-full text-white text-4xl">
            <!-- Icon injected here -->
          </div>
          <h2 class="text-3xl font-bold mb-2">Quiz Terminé !</h2>
          <p id="result-message" class="text-gray-500 mb-8">Voyons voir comment vous vous en êtes sorti.</p>
          
          <div class="text-6xl font-black mb-10 tracking-tighter">
            <span id="score-display">0</span><span class="text-gray-200">/</span><span id="total-questions-display">10</span>
          </div>

          <div id="feedback-badge" class="inline-block px-4 py-1.5 rounded-full text-sm font-bold uppercase tracking-wider mb-10">
            Excellent
          </div>

          <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <button id="restart-btn" class="px-8 py-3 border-2 border-gray-200 hover:border-gray-800 rounded-xl font-semibold transition-all">
              Recommencer
            </button>
          </div>
        </div>

      </div>
    </main>

    <script type="module" src="/src/script.js"></script>
  </body>
</html>
